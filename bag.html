<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d3d82">
  <title>عرض الحقيبة التدريبية</title>

  <style>
    :root {
      --navy: #0d3d82;
      --blue: #1d5ca6;
      --sky: #73bdd5;
      --green: #20a96b;
      --surface: #fff;
      --text: #17375e;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      min-height: 100dvh;
      overflow: hidden;
      background: #e8eef4;
      color: var(--text);
      font-family: Tahoma, Arial, sans-serif;
      display: flex;
      flex-direction: column;
    }

    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 18px;
      padding-top: max(12px, env(safe-area-inset-top));
      color: white;
      background: linear-gradient(135deg, var(--navy), var(--blue));
      box-shadow: 0 3px 14px rgba(0, 0, 0, .22);
    }

    .heading {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn,
    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 9px 14px;
      border: 0;
      border-radius: 11px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
      transition: filter .2s ease, transform .2s ease;
    }

    .back-btn {
      flex: 0 0 auto;
      color: white;
      background: rgba(255, 255, 255, .14);
      border: 1px solid rgba(255, 255, 255, .22);
    }

    .title-wrap { min-width: 0; }

    .kicker {
      display: block;
      margin-bottom: 2px;
      color: #bfe7f0;
      font-size: 12px;
      font-weight: 700;
    }

    .title {
      overflow: hidden;
      margin: 0;
      font-size: clamp(15px, 2vw, 19px);
      line-height: 1.45;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .actions {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .action-btn.open {
      color: var(--navy);
      background: #dff4fa;
    }

    .action-btn.download {
      color: white;
      background: var(--green);
      box-shadow: 0 6px 14px rgba(0, 0, 0, .16);
    }

    .back-btn:hover,
    .action-btn:hover { filter: brightness(1.08); }

    .back-btn:active,
    .action-btn:active { transform: scale(.98); }

    .viewer-shell {
      position: relative;
      flex: 1;
      min-height: 0;
      background: #dbe4ec;
      -webkit-overflow-scrolling: touch;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }

    .loading {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #eef4f8, #dce8f0);
      text-align: center;
      transition: opacity .25s ease, visibility .25s ease;
    }

    .loading.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-card {
      width: min(420px, 100%);
      padding: 25px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 14px 38px rgba(13, 61, 130, .15);
    }

    .spinner {
      width: 44px;
      height: 44px;
      margin: 0 auto 15px;
      border: 4px solid #dceaf2;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }

    .loader-card strong {
      display: block;
      color: var(--navy);
      font-size: 18px;
    }

    .loader-card p {
      margin: 8px 0 0;
      color: #63768b;
      line-height: 1.7;
    }

    .error-box {
      display: none;
      min-height: 100%;
      place-items: center;
      padding: 25px;
      text-align: center;
    }

    .error-box.visible { display: grid; }

    .error-card {
      width: min(500px, 100%);
      padding: 28px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 14px 36px rgba(13, 61, 130, .14);
    }

    .error-card h2 { color: var(--navy); }
    .error-card p { color: #60748a; line-height: 1.8; }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 760px) {
      body { overflow: auto; }

      header {
        align-items: stretch;
        flex-direction: column;
        padding-inline: 12px;
      }

      .heading { width: 100%; }
      .title { white-space: normal; }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 100%;
      }

      .action-btn { width: 100%; }

      .viewer-shell {
        min-height: calc(100dvh - 154px);
      }
    }

    @media (max-width: 430px) {
      .action-btn span { font-size: 13px; }
      .back-btn { padding-inline: 10px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
      .spinner { animation: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="heading">
      <a class="back-btn" href="index.html" aria-label="العودة إلى الصفحة الرئيسية">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="m15.5 5-7 7 7 7 1.5-1.5-5.5-5.5L17 6.5z"/>
        </svg>
        <span>الرئيسية</span>
      </a>

      <div class="title-wrap">
        <span class="kicker">الحقيبة التدريبية</span>
        <h1 class="title" id="pageTitle">جاري تجهيز الملف...</h1>
      </div>
    </div>

    <nav class="actions" aria-label="خيارات ملف الحقيبة">
      <a class="action-btn open" id="openBtn" href="#" target="_blank" rel="noopener">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M14 3h7v7h-2V6.41l-9.3 9.3-1.4-1.42L17.58 5H14zM5 5h6v2H5v12h12v-6h2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2"/>
        </svg>
        <span>فتح مباشر</span>
      </a>

      <a class="action-btn download" id="downloadBtn" href="#" download>
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M5 20h14v-2H5zm14-11h-4V3H9v6H5l7 7z"/>
        </svg>
        <span>تحميل الملف</span>
      </a>
    </nav>
  </header>

  <main class="viewer-shell">
    <div class="loading" id="loading" aria-live="polite">
      <div class="loader-card">
        <div class="spinner" aria-hidden="true"></div>
        <strong>جاري تحميل الحقيبة</strong>
        <p>قد يستغرق ظهور الملف عدة ثوانٍ بحسب سرعة الاتصال.</p>
      </div>
    </div>

    <iframe id="pdfViewer" title="عارض الحقيبة التدريبية" allow="fullscreen"></iframe>

    <section class="error-box" id="errorBox">
      <div class="error-card">
        <h2>تعذر تحديد الحقيبة المطلوبة</h2>
        <p>ارجع إلى الصفحة الرئيسية واختر إحدى الحقائب المتاحة.</p>
        <a class="action-btn open" href="index.html">العودة إلى الرئيسية</a>
      </div>
    </section>
  </main>

  <script>
    const bags = {
      companies: {
        title: 'حقيبة أساسيات نظام الشركات',
        file: 'حقيبة أساسيات نظام الشركات.pdf',
        downloadName: 'حقيبة أساسيات نظام الشركات.pdf'
      },
      financial: {
        title: 'حقيبة إيداع القوائم المالية تحت التعديل',
        file: 'حقيبة ايداع القوائم المالية تحت التعديل.pdf',
        downloadName: 'حقيبة ايداع القوائم المالية تحت التعديل.pdf'
      }
    };

    const params = new URLSearchParams(window.location.search);
    const selectedBag = bags[params.get('bag')];

    const pageTitle = document.getElementById('pageTitle');
    const viewer = document.getElementById('pdfViewer');
    const openBtn = document.getElementById('openBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const loading = document.getElementById('loading');
    const errorBox = document.getElementById('errorBox');

    if (!selectedBag) {
      loading.classList.add('hidden');
      viewer.hidden = true;
      errorBox.classList.add('visible');
    } else {
      document.title = selectedBag.title + ' | معسكر إقرار التطبيقي للمحاسبين';
      pageTitle.textContent = selectedBag.title;

      const directUrl = new URL(selectedBag.file, window.location.href).href;
      openBtn.href = directUrl;
      downloadBtn.href = directUrl;
      downloadBtn.setAttribute('download', selectedBag.downloadName);

      // عند النشر على GitHub Pages نستخدم عارض Google لزيادة التوافق مع الجوال.
      // عند فتح الملفات محلياً نعرض ملف PDF مباشرة.
      const isHosted = window.location.protocol === 'http:' || window.location.protocol === 'https:';
      viewer.src = isHosted
        ? 'https://docs.google.com/gview?embedded=1&url=' + encodeURIComponent(directUrl)
        : directUrl;

      viewer.addEventListener('load', () => {
        window.setTimeout(() => loading.classList.add('hidden'), 300);
      });

      // لا نترك شاشة التحميل ظاهرة للأبد إذا منع المتصفح حدث التحميل.
      window.setTimeout(() => loading.classList.add('hidden'), 7000);
    }
  </script>
</body>
</html>
