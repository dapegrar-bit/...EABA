<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الحقائب التدريبية - معسكر إقرار التطبيقي للمحاسبين</title>

  <meta property="og:title" content="الحقائب التدريبية - معسكر إقرار التطبيقي للمحاسبين">
  <meta property="og:description" content="استعراض الحقائب التدريبية لمعسكر إقرار التطبيقي للمحاسبين">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="الحقائب التدريبية - معسكر إقرار التطبيقي للمحاسبين">
  <meta name="twitter:description" content="استعراض الحقائب التدريبية لمعسكر إقرار التطبيقي للمحاسبين">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f7f7f7;
      padding: 40px 20px;
      margin: 0;
    }

    .boxes {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: stretch;
      gap: 30px;
      max-width: 1260px;
      margin: auto;
    }

    .box {
      background: white;
      padding: 40px 30px;
      border-radius: 18px;
      width: 100%;
      max-width: 600px;
      box-sizing: border-box;
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .thumb {
      width: 100%;
      max-width: 380px;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
      margin-bottom: 25px;
      background: #fff;
    }

    h1 {
      margin: 10px 0;
      color: #1f2a60;
      font-size: 28px;
    }

    h2 {
      margin: 10px 0 20px;
      color: #333;
      font-size: 20px;
      line-height: 1.5;
    }

    p {
      font-size: 18px;
      color: #555;
      line-height: 1.8;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      padding: 15px 28px;
      background: #1f2a60;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      transition: 0.3s;
      width: 100%;
      box-sizing: border-box;
      max-width: 340px;
      margin-top: auto;
    }

    .btn:hover {
      background: #2d3b85;
    }

    @media (max-width: 700px) {
      body {
        padding: 20px 12px;
      }

      .box {
        padding: 28px 18px;
      }
    }
  </style>
</head>
<body>

  <div class="boxes">
    <div class="box">
      <img src="companies-cover.jpg" alt="صورة حقيبة أساسيات نظام الشركات" class="thumb">

      <h1>الحقيبة التدريبية</h1>
      <h2>حقيبة أساسيات نظام الشركات</h2>

      <p>اضغط على الزر أدناه لمعاينة وتصفح ملف الحقيبة مباشرة من الجوال.</p>

      <a href="bag.html?bag=companies" class="btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="fill: currentColor;">
          <path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM19 19H5V5H19V19ZM12 6L7 11H10V18H14V11H17L12 6Z"/>
        </svg>
        <span>فتح واستعراض الحقيبة التدريبية</span>
      </a>
    </div>

    <div class="box">
      <img src="financial-cover.jpg" alt="صورة حقيبة إيداع القوائم المالية" class="thumb">

      <h1>الحقيبة التدريبية</h1>
      <h2>حقيبة إيداع القوائم المالية تحت التعديل</h2>

      <p>اضغط على الزر أدناه لمعاينة وتصفح ملف الحقيبة مباشرة من الجوال.</p>

      <a href="bag.html?bag=financial" class="btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="fill: currentColor;">
          <path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM19 19H5V5H19V19ZM12 6L7 11H10V18H14V11H17L12 6Z"/>
        </svg>
        <span>فتح واستعراض الحقيبة التدريبية</span>
      </a>
    </div>
  </div>

</body>
</html>
